<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Soğuk Depo Sıcaklık Kayıtları</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #222; line-height: 1.5; padding: 16px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 20px; text-align: center; margin-bottom: 12px; color: #1a3c5e; }
    .subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 16px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
    .toolbar label { font-weight: 600; font-size: 14px; min-width: 90px; }
    .toolbar select { flex: 1; min-width: 150px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: background .15s; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #155ab6; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-secondary:hover { background: #545b62; }
    .btn-outline { background: transparent; border: 1px solid #1a73e8; color: #1a73e8; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #e9ecef; font-size: 14px; }
    th { background: #1a3c5e; color: #fff; font-weight: 600; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f1f5ff; }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 16px; }
    .pagination button { padding: 6px 16px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 14px; }
    .pagination button:disabled { opacity: .4; cursor: default; }
    .pagination span { font-size: 14px; color: #555; }
    .badge-ok { background: #d4edda; color: #155724; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .badge-warn { background: #fff3cd; color: #856404; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .badge-err { background: #f8d7da; color: #721c24; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .empty { text-align: center; padding: 32px 16px; color: #888; font-style: italic; }
    .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 500; z-index: 1000; opacity: 0; transition: opacity .3s; max-width: 90%; text-align: center; }
    .toast.show { opacity: 1; }
    .toast.info { background: #1a73e8; }
    .toast.success { background: #28a745; }
    .toast.error { background: #dc3545; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
    .modal h2 { margin-bottom: 12px; font-size: 18px; }
    .modal p { font-size: 14px; color: #555; margin-bottom: 16px; }
    .modal img { max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 16px; }
    .modal .btn { width: 100%; justify-content: center; }
    .date-group { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .date-group label { font-weight: 600; font-size: 13px; min-width: auto; }
    .date-group input[type=date] { padding: 7px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; font-family: inherit; }
    .btn-today { background: #e8f0fe; color: #1a73e8; border: 1px solid #1a73e8; }
    .btn-today:hover { background: #d2e3fc; }
    .loading { text-align: center; padding: 24px; color: #666; font-size: 14px; }
    @media (max-width: 600px) {
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar label { min-width: auto; }
      .date-group { flex-wrap: nowrap; }
      .date-group input[type=date] { flex: 1; min-width: 0; }
      th, td { font-size: 13px; padding: 8px 6px; }
      h1 { font-size: 17px; }
      /* Mobil kart görünümü */
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { margin-bottom: 12px; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
      td { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px; border: none; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
      td:last-child { border-bottom: none; }
      td::before { content: attr(data-label); font-weight: 600; color: #555; font-size: 12px; margin-right: 8px; white-space: nowrap; }
      td .badge-ok, td .badge-warn, td .badge-err { flex-shrink: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Soğuk Depo Sıcaklık Kayıtları</h1>
    <p class="subtitle">QR Kod ile Hızlı Görüntüleme</p>

    <div class="toolbar">
      <label for="depoFilter">Depo:</label>
      <select id="depoFilter" onchange="depoDegisti()"></select>
      <button class="btn btn-today" onclick="bugunuGoster()">Bugün</button>
      <button class="btn btn-outline" onclick="sonIkiGun()">Dün &amp; Bugün</button>
      <button class="btn btn-outline" onclick="tumuGoster()">Tümü</button>
      <button class="btn btn-primary" onclick="showQrModal()">QR</button>
      <button class="btn btn-secondary" onclick="pdfYap()">PDF</button>
    </div>

    <div id="tabloAlani">
      <div class="loading" id="yukleniyor">Veriler yükleniyor...</div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">&nbsp;</div>

  <!-- QR Modal -->
  <div id="qrModal" class="modal-overlay" onclick="if(event.target===this)closeQrModal()">
    <div class="modal">
      <h2>QR Kod</h2>
      <p>Depo sıcaklık kayıtlarını içerir</p>
      <div id="qrKod"></div>
      <button class="btn btn-primary" onclick="closeQrModal()">Kapat</button>
    </div>
  </div>

  <script>
    var STORAGE_KEY = 'haccp_records';
    var DEPO_KEY = 'haccp_depo_adlari';
    var GAS_KEY = 'gsheet_webapp_url';
    var DEFAULT_DEPOLAR = ['So\u011fuk Hava Deposu 5', 'So\u011fuk Hava Deposu 6', 'So\u011fuk Hava Deposu 7', 'So\u011fuk Hava Deposu 8'];
    var haccpRecords = [];
    var allDepos = [];
    var seciliDepo = '';
    var sayfa = 0;
    var sayfaBoyutu = 10;
    var DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbynBf7pBHQrZ0Vh3lSyTyceozIBXF_uZP2ZIkkd76C7SkSqKoRRJANC68LGCqTAXYHCCg/exec';
    var gasUrl = getUrlParam('gas') || DEFAULT_GAS_URL;
    var baslangicTarih = '';
    var bitisTarih = '';

    function getUrlParam(name) {
      var m = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
      return m ? decodeURIComponent(m[1]) : null;
    }

    function gosterToast(msg, tip) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + (tip || 'info') + ' show';
      clearTimeout(el._t);
      el._t = setTimeout(function() { el.className = 'toast'; }, 4000);
    }

    function loadData() {
      try { var s = localStorage.getItem(STORAGE_KEY); haccpRecords = s ? JSON.parse(s) : []; } catch (e) { haccpRecords = []; }
      try { var d = localStorage.getItem(DEPO_KEY); allDepos = d ? JSON.parse(d) : [...DEFAULT_DEPOLAR]; } catch (e) { allDepos = [...DEFAULT_DEPOLAR]; }
      if (!gasUrl) { try { gasUrl = localStorage.getItem(GAS_KEY) || ''; } catch (e) {} }
    }

    async function gasVeriCek() {
      if (!gasUrl) { gosterToast('GAS URL eksik!', 'error'); return false; }
      try {
        gosterToast('Veriler y\u00fckleniyor...');
        var res = await fetch(gasUrl + '?sheet=G%C4%B1da%20G%C3%BCvenli%C4%9Fi');
        if (!res.ok) { gosterToast('Sunucu hatas\u0131: ' + res.status, 'error'); return false; }
        var data = await res.json();
        if (data.error) { gosterToast('GAS hatas\u0131: ' + data.error, 'error'); return false; }
        if (data.data && data.data.length > 0) {
          haccpRecords = data.data.map(function(r) { return {
            id: Number(r.id) || Date.now() + Math.random(),
            type: r.type || 'sicaklik',
            tarih: normalizeDate(r.tarih || ''),
            saat: normalizeSaat(r.saat || ''),
            depoAd: r.depoAd || ('Depo ' + (r.depoNo || '')),
            sicaklik: r.sicaklik != null ? Number(r.sicaklik) : undefined,
            nem: r.nem != null ? Number(r.nem) : undefined,
            not: r.not_ || r.not || ''
          };});
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(haccpRecords)); } catch (_) {}
          var uniqueDepos = {};
          haccpRecords.forEach(function(r) { if (r.depoAd) uniqueDepos[r.depoAd] = true; });
          var keys = Object.keys(uniqueDepos);
          if (keys.length > 0) allDepos = keys.sort();
          gosterToast(haccpRecords.length + ' kay\u0131t y\u00fcklendi', 'success');
          return true;
        } else {
          gosterToast('GAS\'tan veri geldi ama bo\u015f', 'info');
          return false;
        }
      } catch (e) {
        gosterToast('Ba\u011flant\u0131 hatas\u0131: ' + e.message, 'error');
        return false;
      }
    }

    function formatTarihTR(t) {
      if (!t) return '\u2014';
      var m = t.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return m ? m[3] + '.' + m[2] + '.' + m[1] : t;
    }

    function normalizeDate(v) {
      if (!v) return '';
      if (typeof v === 'number') {
        var d = new Date(1899, 11, 30 + v);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      }
      if (typeof v === 'string' && v.match(/^\d{2}\.\d{2}\.\d{4}$/)) {
        var p = v.split('.');
        return p[2] + '-' + p[1] + '-' + p[0];
      }
      return String(v).slice(0,10);
    }

    function normalizeSaat(v) {
      if (!v) return '';
      return String(v).slice(0,5);
    }

    function sicaklikDurum(sicaklik, depoAd) {
      var v = parseFloat(sicaklik);
      if (isNaN(v)) return { text: '\u2014', cls: '' };
      var min, max;
      var da = String(depoAd || '').toLowerCase();
      if (da.includes('dondurucu')) { min = -24; max = -18; }
      else if (da.includes('so\u011fuk') || da.includes('soguk')) { min = 0; max = 4; }
      else return { text: '\u2014', cls: '' };
      if (v >= min && v <= max) return { text: 'Uygun', cls: 'badge-ok' };
      if (v < min) return { text: 'D\u00fc\u015f\u00fck', cls: 'badge-warn' };
      return { text: 'Y\u00fcksek', cls: 'badge-err' };
    }

    function sonIkiGun() {
      var d = new Date();
      var bugun = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      var dun = new Date(d);
      dun.setDate(dun.getDate() - 1);
      baslangicTarih = dun.getFullYear() + '-' + String(dun.getMonth() + 1).padStart(2, '0') + '-' + String(dun.getDate()).padStart(2, '0');
      bitisTarih = bugun;
      sayfa = 0;
      renderTablosu();
    }

    function tumuGoster() {
      baslangicTarih = '';
      bitisTarih = '';
      sayfa = 0;
      renderTablosu();
    }

    function depoDegisti() {
      var s = document.getElementById('depoFilter');
      seciliDepo = s ? s.value : '';
      sayfa = 0;
      renderTablosu();
    }

    function bugunuGoster() {
      var d = new Date();
      baslangicTarih = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      bitisTarih = baslangicTarih;
      sayfa = 0;
      renderTablosu();
    }

    function depoListesiDoldur() {
      var s = document.getElementById('depoFilter');
      if (!s) return;
      var cur = s.value;
      s.innerHTML = '<option value="">T\u00fcm\u00fc</option>' + allDepos.map(function(d) {
        return '<option value="' + d.replace(/"/g, '&quot;') + '">' + d + '</option>';
      }).join('');
      if (cur) s.value = cur;
    }

    function renderTablosu() {
      var alan = document.getElementById('tabloAlani');
      var filtrelenmis = haccpRecords.filter(function(r) {
        if (seciliDepo && r.depoAd !== seciliDepo) return false;
        if (baslangicTarih && r.tarih < baslangicTarih) return false;
        if (bitisTarih && r.tarih > bitisTarih) return false;
        return true;
      });
      filtrelenmis.sort(function(a, b) {
        var ta = (a.tarih || '').replace(/-/g, '') + (a.saat || '').replace(/:/g, '');
        var tb = (b.tarih || '').replace(/-/g, '') + (b.saat || '').replace(/:/g, '');
        return tb.localeCompare(ta);
      });
      var toplam = filtrelenmis.length;
      var bas = sayfa * sayfaBoyutu;
      var bit = Math.min(bas + sayfaBoyutu, toplam);
      var sayfaGorunen = filtrelenmis.slice(bas, bit);

      if (toplam === 0) {
        alan.innerHTML = '<div class="empty">Bu depoya ait kay\u0131t bulunamad\u0131.</div>';
        return;
      }
      var html = '<table><thead><tr><th>Tarih</th><th>Saat</th><th>Depo Ad\u0131</th><th>S\u0131cakl\u0131k (&deg;C)</th><th>Nem (%)</th><th>Not</th></tr></thead><tbody>';
      sayfaGorunen.forEach(function(r) {
        var durum = sicaklikDurum(r.sicaklik, r.depoAd);
        var not = r.not || '\u2014';
        if (not.length > 50) not = not.slice(0, 50) + '...';
        html += '<tr><td data-label="Tarih">' + formatTarihTR(r.tarih) + '</td><td data-label="Saat">' + (r.saat || '\u2014') + '</td><td data-label="Depo">' + (r.depoAd || '\u2014') + '</td><td data-label="S\u0131cakl\u0131k">' + (r.sicaklik != null ? r.sicaklik.toFixed(1) : '\u2014') + ' <span class="' + durum.cls + '">' + durum.text + '</span></td><td data-label="Nem">' + (r.nem != null ? r.nem.toFixed(0) : '\u2014') + '</td><td data-label="Not">' + not + '</td></tr>';
      });
      html += '</tbody></table>';
      html += '<div class="pagination">';
      html += '<button onclick="sayfa--;renderTablosu()"' + (sayfa <= 0 ? ' disabled' : '') + '>\u2039 \u00d6nceki</button>';
      html += '<span>' + (bas + 1) + '-' + bit + ' / ' + toplam + '</span>';
      html += '<button onclick="sayfa++;renderTablosu()"' + (bit >= toplam ? ' disabled' : '') + '>Sonraki \u203a</button>';
      html += '</div>';
      alan.innerHTML = html;
    }

    async function init() {
      loadData();
      // URL'den ?depo=X parametresini oku
      var directDepo = getUrlParam('depo');
      if (directDepo) {
        if (allDepos.indexOf(directDepo) < 0) {
          allDepos.push(directDepo);
          allDepos.sort();
        }
        document.getElementById('depoFilter').value = directDepo;
        seciliDepo = directDepo;
      }
      depoListesiDoldur();
      sayfa = 0;
      // Y\u00fckleniyor yaz\u0131s\u0131n\u0131 hemen kald\u0131r
      renderTablosu();
      // GAS'tan g\u00fcncel veriyi \u00e7ek (orijinal kod, de\u011fi\u015fmedi)
      var gasOk = await gasVeriCek();
      if (!gasOk && haccpRecords.length > 0) {
        gosterToast(haccpRecords.length + ' kay\u0131t (LocalStorage)', 'info');
      }
      // Dropdown'u GAS'tan gelen depo adlar\u0131yla g\u00fcncelle
      depoListesiDoldur();
      renderTablosu();
    }

    function showQrModal() {
      var modal = document.getElementById('qrModal');
      var qrDiv = document.getElementById('qrKod');
      var url = 'https://mustafaorhan-dev.github.io/depo-sicaklik/';
      qrDiv.innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url) + '" alt="QR Kod" style="max-width:200px" />';
      modal.classList.add('show');
    }

    function closeQrModal() {
      document.getElementById('qrModal').classList.remove('show');
    }

    function pdfYap() {
      var filtrelenmis = haccpRecords.filter(function(r) {
        if (seciliDepo && r.depoAd !== seciliDepo) return false;
        if (baslangicTarih && r.tarih < baslangicTarih) return false;
        if (bitisTarih && r.tarih > bitisTarih) return false;
        return true;
      });
      filtrelenmis.sort(function(a, b) {
        var ta = (a.tarih || '').replace(/-/g, '') + (a.saat || '').replace(/:/g, '');
        var tb = (b.tarih || '').replace(/-/g, '') + (b.saat || '').replace(/:/g, '');
        return tb.localeCompare(ta);
      });
      var rows = [['Tarih', 'Saat', 'Depo Ad\u0131', 'S\u0131cakl\u0131k', 'Nem', 'Not']];
      filtrelenmis.forEach(function(r) {
        rows.push([formatTarihTR(r.tarih), r.saat || '', r.depoAd || '', r.sicaklik != null ? String(r.sicaklik) : '', r.nem != null ? String(r.nem) : '', r.not || '']);
      });
      var csv = rows.map(function(row) {
        return row.map(function(cell) { return '"' + String(cell).replace(/"/g, '""') + '"'; }).join(',');
      }).join('\n');
      var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'sicaklik_kayitlari.csv';
      a.click();
      URL.revokeObjectURL(a.href);
      gosterToast('CSV indiriliyor...', 'success');
    }

    init();
  </script>
</body>
</html>
