<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Soğuk Depo Sıcaklık Kayıtları</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --text2: #475569; --text3: #94a3b8;
      --border: #e2e8f0; --accent: #6366f1; --green: #10b981; --red: #ef4444; --orange: #f59e0b;
      --radius: 14px; --shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0f1e; --card: #131d35; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
        --border: rgba(255,255,255,0.08); --shadow: 0 4px 20px rgba(0,0,0,0.4);
      }
    }
    html { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100%;
      padding: 0; margin: 0;
    }
    .container { max-width: 600px; margin: 0 auto; padding: 1rem; }
    .header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem; position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(12px);
    }
    .header-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: center; gap: 0.75rem; }
    .header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }
    .header .sub { font-size: 0.75rem; color: var(--text3); font-weight: 400; display: block; margin-top: 2px; }

    .filter-bar {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.75rem 1rem;
      margin-bottom: 1rem; box-shadow: var(--shadow);
    }
    .filter-bar label { font-size: 0.85rem; color: var(--text2); font-weight: 600; white-space: nowrap; }
    .filter-bar select {
      flex: 1; padding: 0.5rem 0.6rem; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); color: var(--text);
      font-size: 0.85rem; font-family: inherit;
    }
    .btn-qr {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; font-family: inherit;
      display: flex; align-items: center; gap: 0.4rem;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .btn-qr:active { opacity: 0.7; }

    .table-wrapper {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
    }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table th {
      text-align: left; padding: 0.65rem 0.75rem;
      color: var(--text3); font-weight: 600; font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.5px;
      background: rgba(0,0,0,0.02); border-bottom: 1px solid var(--border);
    }
    .data-table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); color: var(--text2); }
    .data-table tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px;
      font-size: 0.72rem; font-weight: 700;
    }
    .badge-ok { background: rgba(16,185,129,0.12); color: var(--green); }
    .badge-warn { background: rgba(245,158,11,0.12); color: var(--orange); }
    .badge-err { background: rgba(239,68,68,0.12); color: var(--red); }

    .empty-state {
      text-align: center; padding: 2.5rem 1rem;
      color: var(--text3); font-size: 0.9rem;
    }
    .empty-state p { margin-bottom: 0.25rem; }

    .nav {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; padding: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .nav button {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 0.4rem 0.75rem; cursor: pointer;
      color: var(--text2); font-size: 0.85rem; font-family: inherit;
      transition: all 0.2s;
    }
    .nav button:disabled { opacity: 0.3; cursor: default; }
    .nav button:not(:disabled):active { background: rgba(99,102,241,0.08); }
    .nav .page-info { font-size: 0.8rem; color: var(--text3); }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.75rem 1.25rem;
      font-size: 0.85rem; font-weight: 500; color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 100; display: none; white-space: nowrap;
    }
    .toast.show { display: block; }

    @media (max-width: 400px) {
      .container { padding: 0.75rem; }
      .filter-bar { flex-wrap: wrap; }
      .filter-bar select { min-width: 100px; }
      .data-table { font-size: 0.78rem; }
      .data-table th, .data-table td { padding: 0.5rem 0.5rem; }
    }

    /* QR Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 200; display: none; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--card); border-radius: var(--radius);
      padding: 1.5rem; max-width: 360px; width: 100%;
      text-align: center; box-shadow: 0 16px 48px rgba(0,0,0,0.2);
    }
    .modal-box h3 { font-size: 1rem; margin-bottom: 0.25rem; }
    .modal-box p { font-size: 0.8rem; color: var(--text3); margin-bottom: 1rem; }
    .modal-box img { max-width: 100%; height: auto; border-radius: 8px; }
    .modal-box .btn-close {
      margin-top: 1rem; background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 0.5rem 1.5rem; cursor: pointer;
      color: var(--text2); font-size: 0.85rem; font-family: inherit;
    }
    .modal-box .btn-close:active { background: rgba(99,102,241,0.08); }
    @media print {
      .header, .filter-bar, .nav, .btn-qr, .toast, .modal-overlay { display: none !important; }
      .container { padding: 0; max-width: 100%; }
      .table-wrapper { box-shadow: none; border: 1px solid #ccc; }
      .data-table th { background: #f5f5f5; }
      body { background: #fff; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <h1>So\u011fuk Depo S\u0131cakl\u0131k Kay\u0131tlar\u0131 <span class="sub" id="pageSub">QR Kod ile H\u0131zl\u0131 G\u00f6r\u00fcnt\u00fcleme</span></h1>
    </div>
  </div>

  <div class="container">

    <div class="filter-bar">
      <label>Depo Filtresi:</label>
      <select id="depoFilter" onchange="depoDegisti()"></select>
      <button class="btn-qr" onclick="qrOlustur()">QR</button>
      <button class="btn-qr" onclick="window.print()" style="background:var(--green)">PDF</button>
    </div>

    <div class="table-wrapper">
      <div class="empty-state" id="emptyState">
        <p>Bu depoya ait kay\u0131t bulunamad\u0131.</p>
      </div>
      <table class="data-table" id="dataTable" style="display:none">
        <thead>
          <tr><th>Tarih</th><th>Saat</th><th>S\u0131cakl\u0131k</th><th>Durum</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="nav" id="tableNav" style="display:none">
        <button onclick="oncekiSayfa()" id="prevBtn">\u2039 \u00d6nceki</button>
        <span class="page-info" id="pageInfo"></span>
        <button onclick="sonrakiSayfa()" id="nextBtn">Sonraki \u203a</button>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <!-- QR Modal -->
  <div class="modal-overlay" id="qrModal">
    <div class="modal-box">
      <h3 id="qrModalTitle">QR Kod</h3>
      <p id="qrModalSub">Depo s\u0131cakl\u0131k kay\u0131tlar\u0131n\u0131 i\u00e7erir</p>
      <img id="qrImage" style="display:none" alt="QR Kod" />
      <p id="qrFallback" style="font-size:0.8rem;color:var(--text3);word-break:break-all"></p>
      <button class="btn-close" onclick="qrKapat()">Kapat</button>
    </div>
  </div>

  <script>
    var STORAGE_KEY = 'haccp_records';
    var DEPO_KEY = 'haccp_depo_adlari';
    var GAS_KEY = 'gsheet_webapp_url';
    var DEFAULT_DEPOLAR = ['So\u011fuk Hava Deposu 5', 'So\u011fuk Hava Deposu 6', 'So\u011fuk Hava Deposu 7', 'So\u011fuk Hava Deposu 8'];
    var haccpRecords = [];
    var allDepos = [];
    var seciliDepo = '';
    var sayfa = 0;
    var sayfaBoyutu = 10;
    var DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbzY5J2Fj-8PkelM9d7mVJiMdSqHwLlOEsOS9N2oEVmZnbbA1KwN64o6hCVwOiZ8r08RFw/exec';
    var gasUrl = getUrlParam('gas') || DEFAULT_GAS_URL;

    function loadData() {
      try { var s = localStorage.getItem(STORAGE_KEY); haccpRecords = s ? JSON.parse(s) : []; } catch (e) { haccpRecords = []; }
      try { var d = localStorage.getItem(DEPO_KEY); allDepos = d ? JSON.parse(d) : [...DEFAULT_DEPOLAR]; } catch (e) { allDepos = [...DEFAULT_DEPOLAR]; }
      if (!gasUrl) { try { gasUrl = localStorage.getItem(GAS_KEY) || ''; } catch (e) {} }
    }

    async function gasVeriCek() {
      if (!gasUrl) { gosterToast('GAS URL eksik!', 'error'); return false; }
      try {
        gosterToast('Veriler y\u00fckleniyor... (' + gasUrl.substring(0,50) + '...)');
        var res = await fetch(gasUrl + '?sheet=G%C4%B1da%20G%C3%BCvenli%C4%9Fi');
        if (!res.ok) { gosterToast('Sunucu hatas\u0131: ' + res.status, 'error'); return false; }
        var data = await res.json();
        if (data.error) { gosterToast('GAS hatas\u0131: ' + data.error, 'error'); return false; }
        if (data.data && data.data.length > 0) {
          haccpRecords = data.data.map(function(r) { return {
            id: Number(r.id) || Date.now() + Math.random(),
            type: r.type || 'sicaklik',
            tarih: normalizeDate(r.tarih || ''),
            saat: normalizeSaat(r.saat || ''),
            depoAd: r.depoAd || ('Depo ' + (r.depoNo || '')),
            sicaklik: r.sicaklik != null ? Number(r.sicaklik) : undefined,
            not: r.not_ || r.not || ''
          };});
          if (data.depoAdlari && Array.isArray(data.depoAdlari) && data.depoAdlari.length > 0) allDepos = data.depoAdlari;
          gosterToast(haccpRecords.length + ' kay\u0131t y\u00fcklendi', 'success');
          return true;
        } else {
          gosterToast('GAS\'tan veri geldi ama bo\u015f', 'info');
          return false;
        }
      } catch (e) {
        gosterToast('Ba\u011flant\u0131 hatas\u0131: ' + e.message, 'error');
        return false;
      }
    }

    function formatTarihTR(t) {
      if (!t) return '\u2014';
      var m = t.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return m ? m[3] + '.' + m[2] + '.' + m[1] : t;
    }

    function sicaklikDurum(sicaklik, depoAd) {
      var v = parseFloat(sicaklik);
      if (isNaN(v)) return { text: '\u2014', cls: '' };
      var min, max;
      var da = String(depoAd || '').toLowerCase();
      if (da.includes('dondurucu')) { min = -24; max = -18; }
      else if (da.includes('so\u011fuk') || da.includes('soguk')) { min = 0; max = 4; }
      else return { text: '\u2014', cls: '' };
      if (v >= min && v <= max) return { text: 'Uygun', cls: 'badge-ok' };
      if (v < min) return { text: 'D\u00fc\u015f\u00fck', cls: 'badge-warn' };
      return { text: 'Y\u00fcksek', cls: 'badge-err' };
    }

    function depoDegisti() {
      var s = document.getElementById('depoFilter');
      seciliDepo = s ? s.value : '';
      sayfa = 0;
      renderTablosu();
    }

    function depoListesiDoldur() {
      var s = document.getElementById('depoFilter');
      if (!s) return;
      var cur = s.value;
      s.innerHTML = '<option value="">T\u00fcm\u00fc</option>' + allDepos.map(function(d) {
        var sel = d === cur ? ' selected' : '';
        return '<option value="' + d.replace(/"/g,'&quot;') + '"' + sel + '>' + d + '</option>';
      }).join('');
    }

    function getFiltrelenmis() {
      var r = haccpRecords.filter(function(x) { return x.type === 'sicaklik'; });
      if (seciliDepo) r = r.filter(function(x) { return (x.depoAd || '') === seciliDepo; });
      r.sort(function(a, b) {
        if (a.tarih !== b.tarih) return a.tarih > b.tarih ? -1 : 1;
        return (a.saat || '') > (b.saat || '') ? -1 : 1;
      });
      return r;
    }

    function renderTablosu() {
      var records = getFiltrelenmis();
      var table = document.getElementById('dataTable');
      var empty = document.getElementById('emptyState');
      var nav = document.getElementById('tableNav');
      var tbody = document.getElementById('tableBody');

      if (records.length === 0) {
        table.style.display = 'none';
        empty.style.display = 'block';
        if (nav) nav.style.display = 'none';
        return;
      }
      table.style.display = 'table';
      empty.style.display = 'none';

      var totalPages = Math.ceil(records.length / sayfaBoyutu);
      if (sayfa >= totalPages) sayfa = 0;
      if (sayfa < 0) sayfa = totalPages - 1;
      var start = sayfa * sayfaBoyutu;
      var pageRecords = records.slice(start, start + sayfaBoyutu);

      tbody.innerHTML = pageRecords.map(function(r) {
        var depoAd = r.depoAd || '';
        var durum = sicaklikDurum(r.sicaklik, depoAd);
        return '<tr>' +
          '<td>' + formatTarihTR(r.tarih) + '</td>' +
          '<td>' + (r.saat || '\u2014') + '</td>' +
          '<td style="font-weight:700">' + r.sicaklik + '</td>' +
          '<td><span class="badge ' + durum.cls + '">' + durum.text + '</span></td>' +
        '</tr>';
      }).join('');

      if (nav) {
        nav.style.display = totalPages > 1 ? 'flex' : 'none';
        document.getElementById('pageInfo').textContent = 'Sayfa ' + (sayfa + 1) + ' / ' + totalPages + ' (' + records.length + ' kay\u0131t)';
        document.getElementById('prevBtn').disabled = sayfa === 0;
        document.getElementById('nextBtn').disabled = sayfa >= totalPages - 1;
      }
    }

    function oncekiSayfa() { if (sayfa > 0) { sayfa--; renderTablosu(); } }
    function sonrakiSayfa() {
      var records = getFiltrelenmis();
      var totalPages = Math.ceil(records.length / sayfaBoyutu);
      if (sayfa < totalPages - 1) { sayfa++; renderTablosu(); }
    }

    function qrOlustur() {
      var depo = document.getElementById('depoFilter').value;
      if (!depo) { gosterToast('L\u00fctfen bir depo se\u00e7in.'); return; }

      var pageUrl = location.protocol + '//' + location.host + location.pathname + '?depo=' + encodeURIComponent(depo);

      var modal = document.getElementById('qrModal');
      var img = document.getElementById('qrImage');
      var fallback = document.getElementById('qrFallback');
      var title = document.getElementById('qrModalTitle');
      var sub = document.getElementById('qrModalSub');

      title.textContent = depo;
      sub.textContent = 'Canl\u0131 veri QR kodu';

      var url = 'https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=' + encodeURIComponent(pageUrl);
      img.src = url;
      img.style.display = 'block';
      img.onerror = function() {
        img.style.display = 'none';
        fallback.textContent = pageUrl;
      };
      img.onload = function() { fallback.textContent = pageUrl; };

      modal.classList.add('open');
    }

    function qrKapat() {
      document.getElementById('qrModal').classList.remove('open');
    }
    document.getElementById('qrModal').addEventListener('click', function(e) {
      if (e.target === this) qrKapat();
    });

    function gosterToast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._timer);
      el._timer = setTimeout(function() { el.classList.remove('show'); }, 2500);
    }

    function getUrlParam(name) {
      var match = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
      return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : null;
    }

    function normalizeDate(v) {
      if (!v) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
      if (/^\d+(\.\d+)?$/.test(String(v))) { var d = new Date(1899, 11, 30 + Number(v)); if (!isNaN(d)) return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
      var d = new Date(v);
      if (!isNaN(d)) return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      return '';
    }
    function normalizeSaat(v) {
      if (!v) return '';
      if (/^\d{2}:\d{2}$/.test(v)) return v;
      var d = new Date(v);
      if (!isNaN(d)) return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      return v;
    }

    (async function() {
      loadData();

      var directDepo = getUrlParam('depo');
      var dataStr = getUrlParam('v');
      var liveOk = false;

      // Önce canlı veri dene (GAS)
      if (!dataStr && gasUrl) {
        gosterToast('Veriler y\u00fckleniyor...');
        liveOk = await gasVeriCek();
      }

      // Canlı gelmezse localStorage veya QR verisi dene
      if (!liveOk) {
        if (dataStr) {
          var items = dataStr.split(',').filter(Boolean);
          items.forEach(function(item) {
            var parts = item.split('|');
            if (parts.length >= 3) {
              haccpRecords.push({ id: Date.now() + Math.random(), type: 'sicaklik', tarih: parts[0], saat: parts[1], depoAd: directDepo, sicaklik: parseFloat(parts[2]), not: '' });
            }
          });
          if (haccpRecords.length > 0 && directDepo && allDepos.indexOf(directDepo) < 0) allDepos.push(directDepo);
        }
      }

      var subEl = document.getElementById('pageSub');
      if (liveOk) {
        subEl.textContent = 'Canl\u0131 veri (' + haccpRecords.length + ' kay\u0131t)';
      } else if (dataStr) {
        subEl.textContent = (directDepo || 'Depo') + ' - QR verisi';
      }

      depoListesiDoldur();

      if (directDepo) {
        document.getElementById('depoFilter').value = directDepo;
        seciliDepo = directDepo;
      }

      renderTablosu();
    })();
  </script>

</body>
</html>
